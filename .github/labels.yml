# Efficient Labs — GitHub Label Taxonomy
# SOURCE OF TRUTH for repository labels. Consumed by the label-sync step / gh CLI.
# Edit this file to add/change/remove labels; the sync step reconciles GitHub to match.
#
# Existing default labels are RETAINED (not removed) and are not managed here:
#   bug · enhancement · documentation · question · duplicate ·
#   help wanted · good first issue · invalid · wontfix · claude-task
#
# Each entry: { name, color (hex, no '#'), description }

# --- severity ---
- name: "P0"
  color: "b60205"
  description: "critical/now"
- name: "P1"
  color: "d93f0b"
  description: "high"
- name: "P2"
  color: "fbca04"
  description: "medium"
- name: "P3"
  color: "0e8a16"
  description: "low"

# --- status ---
- name: "needs-proof"
  color: "d4c5f9"
  description: "proof/receipts missing"
- name: "needs-review"
  color: "fef2c0"
  description: "awaiting review"
- name: "blocked"
  color: "000000"
  description: "blocked on a dependency"
- name: "ready-to-merge"
  color: "0e8a16"
  description: "approved + proven"

