# Canonical label taxonomy for EfficientLabs-ai/seif — THE source of truth.
#
# Governance (enforced by .github/workflows/sync-labels.yml):
#   - Changes enter ONLY through the normal flow: branch -> tests -> review -> PR -> founder merge.
#   - The sync job runs AFTER changes land on `main`; it is idempotent (create-or-update).
#   - It NEVER deletes unknown/external labels — it reports them as drift for manual review.
#   - Do NOT manually create labels that are absent from this file.
#
# Namespaced for clean, OS-like filtering. An issue/PR generally needs only:
#   one type:  ·  one area:  ·  one status:  ·  one priority:   (+ optional evidence:/launch:)
#
# NOTE: this REPLACES the earlier taxonomy (P0-P3, impact:*, agent:*, *-decision, proof:*, plus the
# GitHub defaults). Those will appear as DRIFT in the first sync run and must be removed MANUALLY
# (the sync never auto-deletes). Each entry: { name, color (hex, no '#'), description }.

# ---- type: what kind of change ----
- name: "type:bug"
  color: "d73a4a"
  description: "A defect — something is broken"
- name: "type:feature"
  color: "a2eeef"
  description: "New capability or enhancement"
- name: "type:documentation"
  color: "0075ca"
  description: "Docs only"
- name: "type:test"
  color: "c2e0c6"
  description: "Tests only"
- name: "type:refactor"
  color: "d4c5f9"
  description: "Behaviour-preserving restructure"
- name: "type:security"
  color: "b60205"
  description: "Security fix or hardening"
- name: "type:infrastructure"
  color: "5319e7"
  description: "CI, tooling, ops, build"
- name: "type:research"
  color: "fef2c0"
  description: "Experiment / measurement / investigation"
- name: "type:chore"
  color: "ededed"
  description: "Routine maintenance"

# ---- area: which subsystem ----
- name: "area:seif"
  color: "1d76db"
  description: "SEIF kernel / gate / loop"
- name: "area:logos"
  color: "1d76db"
  description: "LOGOS planning / orchestration"
- name: "area:harness"
  color: "1d76db"
  description: "Project harness / receipts"
- name: "area:ecp"
  color: "1d76db"
  description: "Engineering Context Profile / context loading"
- name: "area:memory"
  color: "1d76db"
  description: "Tripartite memory (Redis / DB / episodic)"
- name: "area:graph"
  color: "1d76db"
  description: "Code graph / blast-radius / invalidation"
- name: "area:stratos"
  color: "1d76db"
  description: "StratosAgent"
- name: "area:atmosphere"
  color: "1d76db"
  description: "Atmosphere mesh"
- name: "area:exos"
  color: "1d76db"
  description: "EXOS"
- name: "area:ari"
  color: "1d76db"
  description: "ARI"
- name: "area:website"
  color: "1d76db"
  description: "efficientlabs-web / public surface"
- name: "area:operations"
  color: "1d76db"
  description: "Governance / process / command-center"

# ---- status: where it is in the flow ----
- name: "status:triage"
  color: "ededed"
  description: "Needs triage"
- name: "status:ready"
  color: "0e8a16"
  description: "Ready to start"
- name: "status:in-progress"
  color: "1d76db"
  description: "Actively being worked"
- name: "status:blocked"
  color: "000000"
  description: "Blocked on a dependency"
- name: "status:review-required"
  color: "fbca04"
  description: "Awaiting review"
- name: "status:founder-gated"
  color: "b60205"
  description: "Founder-only action required"

# ---- priority ----
- name: "priority:p0-blocker"
  color: "b60205"
  description: "P0 — drop everything"
- name: "priority:p1-high"
  color: "d93f0b"
  description: "P1 — high"
- name: "priority:p2-medium"
  color: "fbca04"
  description: "P2 — medium"
- name: "priority:p3-low"
  color: "0e8a16"
  description: "P3 — low"

# ---- evidence: honesty vocabulary (optional) ----
- name: "evidence:measured"
  color: "0e8a16"
  description: "MEASURED — verified with data"
- name: "evidence:built"
  color: "1d76db"
  description: "BUILT — exists, not yet measured"
- name: "evidence:wired"
  color: "5319e7"
  description: "WIRED — integrated into the live path"
- name: "evidence:experimental"
  color: "fbca04"
  description: "EXPERIMENTAL — exploratory"
- name: "evidence:target"
  color: "ededed"
  description: "TARGET — hypothesis, not yet proven"

# ---- launch: commercialization gate (optional) ----
- name: "launch:required"
  color: "b60205"
  description: "Required for launch"
- name: "launch:optional"
  color: "c5def5"
  description: "Nice-to-have for launch"
- name: "launch:post-launch"
  color: "ededed"
  description: "After launch"
